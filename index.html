<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Выходной променад · МАММ → Страстной бульвар</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --bg: #f6f3ee;
    --ink: #2a2a2a;
    --muted: #6b6b6b;
    --accent: #c0392b;
    --card: #ffffff;
    --line: #e4dfd5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; color: var(--ink); background: var(--bg); }
  #app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
  #sidebar {
    background: var(--card);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #sidebar header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--card); z-index: 5;
  }
  #sidebar h1 { font-size: 18px; margin: 0 0 4px; font-weight: 600; letter-spacing: -0.01em; }
  #sidebar .sub { font-size: 13px; color: var(--muted); }
  #sidebar .stats { display: flex; gap: 14px; margin-top: 10px; font-size: 12px; color: var(--muted); }
  #sidebar .stats b { color: var(--ink); font-weight: 600; }
  #list { padding: 8px 0 24px; }
  .pt {
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    display: flex; gap: 12px; align-items: flex-start;
    transition: background .15s;
  }
  .pt:hover { background: #faf7f1; }
  .pt.active { background: #fbecea; }
  .pt .num {
    flex: 0 0 26px; height: 26px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
  }
  .pt.seg .num { background: #8a8a8a; }
  .pt .body h3 { margin: 0 0 3px; font-size: 14px; font-weight: 600; }
  .pt .body p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.4; }
  .pt .body .tag { display: inline-block; font-size: 11px; color: var(--accent); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  #map { height: 100vh; }
  .leaflet-marker-icon.num-marker {
    background: var(--accent); color: #fff; border: 2px solid #fff;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  .bonus-marker-wrap {
    width: 26px; height: 26px; border-radius: 50%;
    background: #3a7d44; color: #fff; border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  .pt.bonus .num { background: #3a7d44; }
  .section-title {
    padding: 14px 20px 6px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    background: #faf7f1; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }
  .legend {
    padding: 8px 20px 14px; font-size: 12px; color: var(--muted);
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .legend .r { background: var(--accent); }
  .legend .g { background: #3a7d44; }
  .leaflet-popup-content { font-size: 13px; line-height: 1.45; margin: 12px 14px !important; }
  .leaflet-popup-content b { display: block; margin-bottom: 4px; font-size: 14px; }
  .leaflet-popup-content .tag { display: inline-block; font-size: 11px; color: var(--accent); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  #toggle {
    display: none;
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
    -webkit-tap-highlight-color: transparent;
  }
  #close {
    display: none;
    position: absolute; top: 14px; right: 14px;
    background: transparent; border: none; font-size: 28px; line-height: 1;
    cursor: pointer; color: var(--muted); padding: 4px 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .leaflet-control-zoom { display: none; }
  @media (max-width: 820px) {
    body { overscroll-behavior: none; }
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    #sidebar {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1200; transform: translateY(100%); transition: transform .3s ease;
      border-right: none;
    }
    #sidebar.open { transform: translateY(0); }
    #sidebar header { padding-right: 56px; }
    #toggle { display: flex; align-items: center; gap: 6px; }
    #close { display: block; }
    .pt { padding: 14px 20px; }
    .pt .num { flex: 0 0 30px; height: 30px; font-size: 13px; }
    .pt .body h3 { font-size: 15px; }
    .pt .body p { font-size: 14px; }
  }
  @media (min-width: 821px) {
    .leaflet-control-zoom { display: block; }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <button id="close" aria-label="Закрыть">×</button>
      <h1>Выходной променад</h1>
      <div class="sub">МАММ → Страстной бульвар, 12к1</div>
      <div class="stats">
        <span><b>~4 км</b> пешком</span>
        <span><b>1,5–2 ч</b> с остановками</span>
        <span><b>20</b> + 14 точек</span>
      </div>
      <div class="legend">
        <span><span class="dot r"></span>маршрут</span>
        <span><span class="dot g"></span>инсайдерские</span>
      </div>
    </header>
    <div id="list"></div>
  </aside>
  <div id="map"></div>
  <button id="toggle">☰ маршрут</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"

async function drawRoute() {
  const coords = POINTS.map(p => `${p.lng},${p.lat}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/foot/${coords}?overview=full&geometries=geojson`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.routes && data.routes[0]) {
      const geo = data.routes[0].geometry;
      L.geoJSON(geo, {
        style: { color: '#c0392b', weight: 4, opacity: 0.85, dashArray: '1 6', lineCap: 'round' }
      }).addTo(map);
      const km = (data.routes[0].distance / 1000).toFixed(1);
      const min = Math.round(data.routes[0].duration / 60);
      document.querySelector('#sidebar .stats').innerHTML =
        `<span><b>${km} км</b> пешком</span>` +
        `<span><b>~${min} мин</b> чистого хода</span>` +
        `<span><b>${POINTS.length}</b> точек</span>`;
      return;
    }
  } catch(e) { /* fallback below */ }
  const latlngs = POINTS.map(p => [p.lat, p.lng]);
  L.polyline(latlngs, { color: '#c0392b', weight: 3, opacity: 0.7, dashArray: '6 6' }).addTo(map);
}
drawRoute();

const group = L.featureGroup([...markers, ...bonusMarkers]);
map.fitBounds(group.getBounds().pad(0.08));

const sidebar = document.getElementById('sidebar');
document.getElementById('toggle').addEventListener('click', () => {
  sidebar.classList.add('open');
});
document.getElementById('close').addEventListener('click', () => {
  sidebar.classList.remove('open');
});

if ('geolocation' in navigator) {
  const locateBtn = L.control({ position: 'topleft' });
  locateBtn.onAdd = function() {
    const btn = L.DomUtil.create('button', '');
    btn.innerHTML = '📍';
    btn.style.cssText = 'background:#fff;border:1px solid #ccc;border-radius:8px;padding:8px 10px;font-size:16px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);margin:10px;';
    btn.onclick = () => {
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        map.setView([latitude, longitude], 16);
        L.circleMarker([latitude, longitude], { radius: 8, color: '#1976d2', fillColor: '#1976d2', fillOpacity: 0.8 }).addTo(map);
      }, () => alert('Не удалось определить местоположение'));
    };
    L.DomEvent.disableClickPropagation(btn);
    return btn;
  };
  locateBtn.addTo(map);
}
</script>
</body>
</html>
